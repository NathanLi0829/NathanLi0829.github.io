name: Update Sector Fund Flow

on:
  schedule:
    - cron: "*/5 * * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run collector
        run: python update_sectors.py
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add fund_data.json sector.html
          git diff --cached --quiet || (git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M')" && git push)
