name: Update Sector Fund Flow

on:
  # 每交易日多个时间点自动采集 (UTC时间)
  schedule:
    - cron: "30 1,2,3,5,6 * * 1-5"
    - cron: "10 7 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python update_sectors.py --push
