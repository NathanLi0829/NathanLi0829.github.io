name: Update Sector Fund Flow
on:
  schedule:
    - cron: "*/5 1-3 * * 1-5"
    - cron: "*/5 5-7 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Run collector
        run: python update_sectors.py --local

      - name: Commit and push
        run: |
          git add fund_data.json sector.html
          git diff --cached --quiet || (git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M')" && git push)
